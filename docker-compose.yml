services:
  db:
    image: postgres:16-alpine
    container_name: bjornsson-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bjornsson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bjornsson_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bjornsson"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bjornsson-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "false"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
      SECRET_KEY: troque-esta-chave-em-producao
      TOTP_ISSUER_NAME: O Reino Partido de Bjornsson
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: bjornsson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DB_CONNECT_RETRIES: 30
      DB_CONNECT_DELAY: 1.5
    ports:
      - "8000:8000"
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  bjornsson_postgres_data:
